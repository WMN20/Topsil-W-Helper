<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W-Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="tabs">
    <button class="tab-btn active" data-tab="emailTab">Email</button>
    <button class="tab-btn" data-tab="fileTab">File Paths</button>
    <button class="tab-btn" data-tab="todoTab">To‑Do</button>
    <button class="tab-btn" data-tab="datesTab">Dates</button>
</nav>

<main>

    <!-- EMAIL -->
    <section id="emailTab" class="tab-page active">
        <h2>Email Templates</h2>
        <div class="input-area">
            <input id="templateName" placeholder="Template name">
            <textarea id="templateInput" placeholder="Email text..."></textarea>
            <button onclick="addTemplate()">Add</button>
        </div>
        <div id="templateList" class="item-list"></div>
    </section>

    <!-- FILE PATHS -->
    <section id="fileTab" class="tab-page">
        <h2>File Path Templates</h2>
        <div class="input-area">
            <input id="folderName" placeholder="Path name">
            <input id="folderPath" placeholder="C:\\Folder\\Path">
            <button onclick="addFolder()">Add</button>
        </div>
        <div id="folderList" class="item-list"></div>
    </section>

    <!-- TODO -->
    <section id="todoTab" class="tab-page">
        <h2>Sticky Notes</h2>
        <button onclick="addNote()">Add Sticky Note</button>
        <div id="todoBoard" class="todo-board"></div>
    </section>

    <!-- DATES -->
    <section id="datesTab" class="tab-page">
        <h2>Important Dates</h2>
        <div class="input-area">
            <input id="dateTitle" placeholder="What happens?">
            <input type="date" id="dateValue">
            <input type="time" id="timeValue">
            <button onclick="addDate()">Add Date</button>
        </div>
        <div id="datesList" class="item-list"></div>
    </section>

</main>

<script src="app.js"></script>
</body>
</html>
