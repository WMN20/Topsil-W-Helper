<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W-Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="tabs">
        <button class="tab-btn active" data-tab="emailTab">Email Templates</button>
        <button class="tab-btn" data-tab="fileTab">File Paths</button>
        <button class="tab-btn" data-tab="todoTab">To-Do Board</button>
    </nav>

    <main>

        <!-- EMAIL TAB -->
        <section id="emailTab" class="tab-page active">
            <h2>Email Templates</h2>

            <div class="input-area">
                <input id="templateName" placeholder="Template Name">
                <textarea id="templateInput" placeholder="Write email template..."></textarea>
                <button onclick="addTemplate()">Add Template</button>
            </div>

            <h3>Saved Templates</h3>
            <div id="templateList" class="item-list"></div>
        </section>

        <!-- FILE PATH TAB -->
        <section id="fileTab" class="tab-page">
            <h2>File Path Templates</h2>

            <div class="input-area">
                <input id="folderName" placeholder="Path Name">
                <input id="folderPath" placeholder="C:\\Folder\\Path">
                <button onclick="addFolderShortcut()">Add Path</button>
            </div>

            <h3>Saved Paths</h3>
            <div id="folderList" class="item-list"></div>
        </section>

        <!-- TO-DO TAB -->
        <section id="todoTab" class="tab-page">
            <h2>To-Do Sticky Notes</h2>

            <div class="todo-controls">
                <button onclick="addNote()">Add Sticky Note</button>
            </div>

            <div id="todoBoard" class="todo-board"></div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
